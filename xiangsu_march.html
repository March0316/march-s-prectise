<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紫色像素跑酷</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a0a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }
        #gameContainer {
            position: relative;
            border: 4px solid #9d4edd;
            box-shadow: 0 0 20px #7b2cbf;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 20px;
            text-shadow: 2px 2px 0 #7b2cbf;
            pointer-events: none;
        }
        #controls {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            color: #e0aaff;
            text-align: center;
            font-size: 14px;
        }
        .key {
            display: inline-block;
            padding: 5px 10px;
            background: #5a189a;
            border: 2px solid #9d4edd;
            border-radius: 4px;
            margin: 0 5px;
        }

        /* 通用界面样式 */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #1a0a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        /* 标题样式 */
        .screen h1 {
            font-family: 'Courier New', monospace;
            font-size: 48px;
            color: #e0aaff;
            text-shadow: 4px 4px 0 #7b2cbf;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 2px;
        }

        .screen h2 {
            font-family: 'Courier New', monospace;
            font-size: 36px;
            color: #e0aaff;
            text-shadow: 3px 3px 0 #7b2cbf;
            margin-bottom: 30px;
        }

        /* 按钮样式 */
        .screen button {
            font-family: 'Courier New', monospace;
            font-size: 18px;
            font-weight: bold;
            padding: 12px 24px;
            margin: 10px;
            background: #5a189a;
            color: #fff;
            border: 3px solid #9d4edd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .screen button:hover {
            background: #7b2cbf;
            transform: translateY(-2px);
            box-shadow: 0 4px 0 #5a189a;
        }

        .screen button:active {
            transform: translateY(0);
            box-shadow: 0 0 0 #5a189a;
        }

        /* 开始界面样式 */
        #startScreen .startButtons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        #startScreen .gameInfo {
            color: #e0aaff;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            text-align: center;
            line-height: 1.5;
        }

        /* 关卡选择界面样式 */
        #levelSelectScreen .levelButtons {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        #levelSelectScreen .levelButton {
            width: 120px;
            height: 120px;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 结算界面样式 */
        #completeScreen .stats {
            color: #e0aaff;
            font-family: 'Courier New', monospace;
            font-size: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        #completeScreen .completeButtons {
            display: flex;
            gap: 15px;
        }

        /* 结算动画容器 */
        #completionAnimation {
            width: 200px;
            height: 200px;
            margin-bottom: 30px;
            position: relative;
        }
    </style>
</head>
<body>
    <!-- 开始界面 -->
    <div id="startScreen" class="screen">
        <h1>紫色像素跑酷</h1>
        <div class="startButtons">
            <button id="startGame">开始游戏</button>
            <button id="levelSelect">选择关卡</button>
        </div>
        <div class="gameInfo">
            <p>使用 <span class="key">←</span> <span class="key">→</span> 移动</p>
            <p>使用 <span class="key">空格</span> 跳跃</p>
            <p>收集所有金币并到达终点</p>
        </div>
    </div>

    <!-- 关卡选择界面 -->
    <div id="levelSelectScreen" class="screen">
        <h1>选择关卡</h1>
        <div class="levelButtons">
            <button class="levelButton" data-level="1">关卡 1</button>
            <button class="levelButton" data-level="2">关卡 2</button>
            <button class="levelButton" data-level="3">关卡 3</button>
        </div>
        <button id="backToStart">返回</button>
    </div>

    <!-- 游戏容器 -->
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div id="ui">
            <div>金币: <span id="score">0</span></div>
            <div>生命: <span id="lives">3</span></div>
            <div>关卡: <span id="currentLevel">1</span></div>
        </div>
        <div id="controls">
            <span class="key">←</span> <span class="key">→</span> 移动 <span class="key">空格</span> 跳跃
        </div>
    </div>

    <!-- 结算界面 -->
    <div id="completeScreen" class="screen">
        <div id="completionAnimation"></div>
        <h2>关卡通过!</h2>
        <div class="stats">
            <p>金币收集: <span id="completionScore">0</span></p>
            <p>剩余生命: <span id="completionLives">3</span></p>
        </div>
        <div class="completeButtons">
            <button id="nextLevel">下一关</button>
            <button id="restartLevel">重新开始</button>
            <button id="backToMenu">返回菜单</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;

        // 游戏状态管理
        const game = {
            score: 0,
            lives: 3,
            camera: { x: 0, y: 0 },
            gravity: 0.5,
            gameOver: false,
            gameStarted: false,
            levelCompleted: false,
            currentLevel: 1,
            maxLevel: 3
        };

        // 界面元素
        const screens = {
            start: document.getElementById('startScreen'),
            levelSelect: document.getElementById('levelSelectScreen'),
            game: document.getElementById('gameContainer'),
            complete: document.getElementById('completeScreen')
        };

        const PIXEL_SIZE = 4;

        const player = {
            x: 100,
            y: 200,
            width: 12,
            height: 16,
            vx: 0,
            vy: 0,
            speed: 3,
            jumpPower: -10,
            onGround: false,
            facingRight: true,
            animFrame: 0,
            animTimer: 0
        };

        const platforms = [];
        const coins = [];
        const monsters = [];
        const particles = [];

        // 界面切换函数
        function showScreen(screenName) {
            Object.values(screens).forEach(screen => {
                screen.style.display = 'none';
            });
            screens[screenName].style.display = 'flex';
        }

        // 初始化界面
        function initScreens() {
            showScreen('start');
            
            // 开始游戏按钮
            document.getElementById('startGame').addEventListener('click', () => {
                game.currentLevel = 1;
                startGame();
            });
            
            // 关卡选择按钮
            document.getElementById('levelSelect').addEventListener('click', () => {
                showScreen('levelSelect');
            });
            
            // 返回按钮
            document.getElementById('backToStart').addEventListener('click', () => {
                showScreen('start');
            });
            
            // 关卡按钮
            document.querySelectorAll('.levelButton').forEach(button => {
                button.addEventListener('click', () => {
                    game.currentLevel = parseInt(button.dataset.level);
                    startGame();
                });
            });
            
            // 下一关按钮
            document.getElementById('nextLevel').addEventListener('click', () => {
                if (game.currentLevel < game.maxLevel) {
                    game.currentLevel++;
                    startGame();
                } else {
                    showScreen('start');
                }
            });
            
            // 重新开始按钮
            document.getElementById('restartLevel').addEventListener('click', () => {
                startGame();
            });
            
            // 返回菜单按钮
            document.getElementById('backToMenu').addEventListener('click', () => {
                showScreen('start');
            });
        }

        // 开始游戏
        function startGame() {
            game.score = 0;
            game.lives = 3;
            game.gameOver = false;
            game.gameStarted = true;
            game.levelCompleted = false;
            game.camera.x = 0;
            
            player.x = 100;
            player.y = 200;
            player.vx = 0;
            player.vy = 0;
            
            // 清空数组
            platforms.length = 0;
            coins.length = 0;
            monsters.length = 0;
            particles.length = 0;
            
            // 更新UI
            document.getElementById('score').textContent = '0';
            document.getElementById('lives').textContent = '3';
            document.getElementById('currentLevel').textContent = game.currentLevel;
            
            // 加载关卡
            loadLevel(game.currentLevel);
            
            // 显示游戏界面
            showScreen('game');
        }

        // 加载关卡
        function loadLevel(level) {
            // 添加地面
            platforms.push({ x: 0, y: 350, width: 3000, height: 50 });
            
            if (level === 1) {
                // 关卡1：基础难度
                platforms.push({ x: 300, y: 280, width: 100, height: 20 });
                platforms.push({ x: 500, y: 220, width: 80, height: 20 });
                platforms.push({ x: 700, y: 260, width: 100, height: 20 });
                platforms.push({ x: 900, y: 180, width: 80, height: 20 });
                platforms.push({ x: 1100, y: 240, width: 100, height: 20 });
                platforms.push({ x: 1300, y: 200, width: 80, height: 20 });
                platforms.push({ x: 1500, y: 280, width: 100, height: 20 });
                platforms.push({ x: 1700, y: 220, width: 80, height: 20 });

                const coinPositions = [
                    { x: 340, y: 240 }, { x: 540, y: 180 }, { x: 740, y: 220 },
                    { x: 940, y: 140 }, { x: 1140, y: 200 }, { x: 1340, y: 160 },
                    { x: 1540, y: 240 }, { x: 1740, y: 180 }, { x: 200, y: 310 },
                    { x: 600, y: 310 }, { x: 1000, y: 310 }, { x: 1400, y: 310 }
                ];

                coinPositions.forEach(pos => {
                    coins.push({ x: pos.x, y: pos.y, width: 12, height: 12, collected: false, animFrame: 0 });
                });

                monsters.push({ x: 400, y: 334, width: 14, height: 16, vx: 1, minX: 350, maxX: 500, animFrame: 0 });
                monsters.push({ x: 800, y: 334, width: 14, height: 16, vx: -1.5, minX: 750, maxX: 1000, animFrame: 0 });
                monsters.push({ x: 1200, y: 334, width: 14, height: 16, vx: 1.2, minX: 1150, maxX: 1400, animFrame: 0 });
            } else if (level === 2) {
                // 关卡2：中等难度
                platforms.push({ x: 200, y: 300, width: 80, height: 20 });
                platforms.push({ x: 350, y: 250, width: 100, height: 20 });
                platforms.push({ x: 500, y: 200, width: 80, height: 20 });
                platforms.push({ x: 650, y: 250, width: 100, height: 20 });
                platforms.push({ x: 800, y: 180, width: 80, height: 20 });
                platforms.push({ x: 950, y: 220, width: 100, height: 20 });
                platforms.push({ x: 1100, y: 160, width: 80, height: 20 });
                platforms.push({ x: 1250, y: 200, width: 100, height: 20 });
                platforms.push({ x: 1400, y: 280, width: 80, height: 20 });
                platforms.push({ x: 1550, y: 240, width: 100, height: 20 });
                platforms.push({ x: 1700, y: 200, width: 80, height: 20 });
                platforms.push({ x: 1850, y: 260, width: 100, height: 20 });

                const coinPositions = [
                    { x: 240, y: 260 }, { x: 390, y: 210 }, { x: 540, y: 160 },
                    { x: 690, y: 210 }, { x: 840, y: 140 }, { x: 990, y: 180 },
                    { x: 1140, y: 120 }, { x: 1290, y: 160 }, { x: 1440, y: 240 },
                    { x: 1590, y: 200 }, { x: 1740, y: 160 }, { x: 1890, y: 220 },
                    { x: 150, y: 310 }, { x: 450, y: 310 }, { x: 750, y: 310 },
                    { x: 1050, y: 310 }, { x: 1350, y: 310 }, { x: 1650, y: 310 }
                ];

                coinPositions.forEach(pos => {
                    coins.push({ x: pos.x, y: pos.y, width: 12, height: 12, collected: false, animFrame: 0 });
                });

                monsters.push({ x: 300, y: 334, width: 14, height: 16, vx: 1.2, minX: 250, maxX: 400, animFrame: 0 });
                monsters.push({ x: 600, y: 334, width: 14, height: 16, vx: -1.5, minX: 550, maxX: 700, animFrame: 0 });
                monsters.push({ x: 900, y: 334, width: 14, height: 16, vx: 1.3, minX: 850, maxX: 1000, animFrame: 0 });
                monsters.push({ x: 1200, y: 334, width: 14, height: 16, vx: -1.6, minX: 1150, maxX: 1300, animFrame: 0 });
                monsters.push({ x: 1500, y: 334, width: 14, height: 16, vx: 1.4, minX: 1450, maxX: 1600, animFrame: 0 });
            } else if (level === 3) {
                // 关卡3：高难度
                platforms.push({ x: 150, y: 320, width: 70, height: 20 });
                platforms.push({ x: 280, y: 280, width: 90, height: 20 });
                platforms.push({ x: 420, y: 240, width: 80, height: 20 });
                platforms.push({ x: 550, y: 200, width: 100, height: 20 });
                platforms.push({ x: 700, y: 250, width: 80, height: 20 });
                platforms.push({ x: 830, y: 180, width: 90, height: 20 });
                platforms.push({ x: 970, y: 140, width: 80, height: 20 });
                platforms.push({ x: 1100, y: 190, width: 100, height: 20 });
                platforms.push({ x: 1250, y: 150, width: 80, height: 20 });
                platforms.push({ x: 1380, y: 210, width: 90, height: 20 });
                platforms.push({ x: 1520, y: 270, width: 80, height: 20 });
                platforms.push({ x: 1650, y: 230, width: 100, height: 20 });
                platforms.push({ x: 1800, y: 190, width: 80, height: 20 });
                platforms.push({ x: 1930, y: 250, width: 90, height: 20 });

                const coinPositions = [
                    { x: 190, y: 280 }, { x: 320, y: 240 }, { x: 460, y: 200 },
                    { x: 590, y: 160 }, { x: 740, y: 210 }, { x: 870, y: 140 },
                    { x: 1010, y: 100 }, { x: 1150, y: 150 }, { x: 1290, y: 110 },
                    { x: 1420, y: 170 }, { x: 1560, y: 230 }, { x: 1690, y: 190 },
                    { x: 1840, y: 150 }, { x: 1970, y: 210 }, { x: 120, y: 310 },
                    { x: 350, y: 310 }, { x: 580, y: 310 }, { x: 810, y: 310 },
                    { x: 1040, y: 310 }, { x: 1270, y: 310 }, { x: 1500, y: 310 },
                    { x: 1730, y: 310 }, { x: 1960, y: 310 }
                ];

                coinPositions.forEach(pos => {
                    coins.push({ x: pos.x, y: pos.y, width: 12, height: 12, collected: false, animFrame: 0 });
                });

                monsters.push({ x: 220, y: 334, width: 14, height: 16, vx: 1.5, minX: 170, maxX: 270, animFrame: 0 });
                monsters.push({ x: 480, y: 334, width: 14, height: 16, vx: -1.7, minX: 430, maxX: 530, animFrame: 0 });
                monsters.push({ x: 750, y: 334, width: 14, height: 16, vx: 1.6, minX: 700, maxX: 800, animFrame: 0 });
                monsters.push({ x: 1000, y: 334, width: 14, height: 16, vx: -1.8, minX: 950, maxX: 1050, animFrame: 0 });
                monsters.push({ x: 1250, y: 334, width: 14, height: 16, vx: 1.7, minX: 1200, maxX: 1300, animFrame: 0 });
                monsters.push({ x: 1500, y: 334, width: 14, height: 16, vx: -1.9, minX: 1450, maxX: 1550, animFrame: 0 });
                monsters.push({ x: 1750, y: 334, width: 14, height: 16, vx: 1.8, minX: 1700, maxX: 1800, animFrame: 0 });
            }
        }

        function drawPixelRect(x, y, width, height, color) {
            ctx.fillStyle = color;
            ctx.fillRect(Math.floor(x - game.camera.x), Math.floor(y - game.camera.y), width, height);
        }

        function drawPlayer() {
            const x = Math.floor(player.x - game.camera.x);
            const y = Math.floor(player.y - game.camera.y);
            const bodyColor = '#9d4edd';
            const darkColor = '#5a189a';
            const lightColor = '#c77dff';
            const eyeColor = '#fff';

            ctx.fillStyle = bodyColor;
            ctx.fillRect(x + 16, y, 32, 16);
            ctx.fillStyle = lightColor;
            ctx.fillRect(x + 16, y, 32, 8);
            ctx.fillStyle = darkColor;
            ctx.fillRect(x + 20, y + 4, 4, 4);
            ctx.fillRect(x + 28, y + 4, 4, 4);
            
            ctx.fillStyle = bodyColor;
            ctx.fillRect(x + 20, y + 16, 24, 24);
            ctx.fillStyle = lightColor;
            ctx.fillRect(x + 20, y + 16, 24, 8);
            
            if (player.onGround && Math.abs(player.vx) > 0) {
                const legOffset = Math.sin(player.animFrame * 0.5) * 4;
                ctx.fillStyle = darkColor;
                ctx.fillRect(x + 20, y + 40, 8, 8 + legOffset);
                ctx.fillRect(x + 36, y + 40, 8, 8 - legOffset);
            } else {
                ctx.fillStyle = darkColor;
                ctx.fillRect(x + 20, y + 40, 8, 8);
                ctx.fillRect(x + 36, y + 40, 8, 8);
            }
        }

        function drawPlatform(platform) {
            const x = Math.floor(platform.x - game.camera.x);
            const y = Math.floor(platform.y - game.camera.y);
            ctx.fillStyle = '#7b2cbf';
            ctx.fillRect(x, y, platform.width, platform.height);
            ctx.fillStyle = '#9d4edd';
            ctx.fillRect(x, y, platform.width, 4);
            ctx.fillStyle = '#5a189a';
            ctx.fillRect(x, y + platform.height - 4, platform.width, 4);
        }

        function drawCoin(coin) {
            if (coin.collected) return;
            const x = Math.floor(coin.x - game.camera.x);
            const y = Math.floor(coin.y - game.camera.y);
            const bounce = Math.sin(coin.animFrame * 0.1) * 2;
            ctx.fillStyle = '#ffd700';
            ctx.fillRect(x + 2, y + bounce, 8, 8);
            ctx.fillStyle = '#ffed4a';
            ctx.fillRect(x + 4, y + bounce, 4, 4);
        }

        function drawMonster(monster) {
            const x = Math.floor(monster.x - game.camera.x);
            const y = Math.floor(monster.y - game.camera.y);
            const bounce = Math.abs(Math.sin(monster.animFrame * 0.15)) * 2;
            
            ctx.fillStyle = '#e63946';
            ctx.fillRect(x, y - bounce, monster.width, monster.height);
            ctx.fillStyle = '#ff6b6b';
            ctx.fillRect(x + 2, y - bounce, monster.width - 4, 8);
            ctx.fillStyle = '#000';
            ctx.fillRect(x + 2, y + 2 - bounce, 3, 3);
            ctx.fillRect(x + monster.width - 5, y + 2 - bounce, 3, 3);
            
            const footOffset = Math.sin(monster.animFrame * 0.2) * 2;
            ctx.fillStyle = '#c1121f';
            ctx.fillRect(x + 2, y + monster.height - bounce, 4, 4 + footOffset);
            ctx.fillRect(x + monster.width - 6, y + monster.height - bounce, 4, 4 - footOffset);
        }

        function drawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1;
                p.life--;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 20;
                ctx.fillRect(p.x - game.camera.x, p.y - game.camera.y, p.size, p.size);
                ctx.globalAlpha = 1;
            }
        }

        function spawnParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    size: PIXEL_SIZE,
                    color: color,
                    life: 20
                });
            }
        }

        function updatePlayer() {
            if (game.gameOver || game.levelCompleted) return;

            if (keys.left) {
                player.vx = -player.speed;
                player.facingRight = false;
            } else if (keys.right) {
                player.vx = player.speed;
                player.facingRight = true;
            } else {
                player.vx = 0;
            }

            if (keys.jump && player.onGround) {
                player.vy = player.jumpPower;
                player.onGround = false;
            }

            player.vy += game.gravity;
            player.x += player.vx;
            player.y += player.vy;

            player.onGround = false;
            platforms.forEach(platform => {
                if (player.x < platform.x + platform.width &&
                    player.x + player.width * PIXEL_SIZE > platform.x &&
                    player.y < platform.y + platform.height &&
                    player.y + player.height > platform.y) {
                    
                    if (player.vy > 0 && player.y + player.height < platform.y + platform.height / 2) {
                        player.y = platform.y - player.height;
                        player.vy = 0;
                        player.onGround = true;
                    }
                }
            });

            if (player.y > canvas.height) {
                game.lives--;
                document.getElementById('lives').textContent = game.lives;
                if (game.lives <= 0) {
                    game.gameOver = true;
                } else {
                    player.x = 100;
                    player.y = 200;
                    player.vx = 0;
                    player.vy = 0;
                }
            }

            if (player.x < game.camera.x + 100) {
                player.x = game.camera.x + 100;
            }

            // 检查是否收集完所有金币并到达终点
            const allCoinsCollected = coins.every(coin => coin.collected);
            const reachedEnd = player.x > 2000;
            
            if (allCoinsCollected && reachedEnd) {
                completeLevel();
            }

            player.animTimer++;
            if (player.animTimer > 5) {
                player.animFrame++;
                player.animTimer = 0;
            }
        }

        // 关卡完成
        function completeLevel() {
            game.levelCompleted = true;
            
            // 更新结算界面
            document.getElementById('completionScore').textContent = game.score;
            document.getElementById('completionLives').textContent = game.lives;
            
            // 播放像素风格结算动画
            playCompletionAnimation();
            
            // 显示结算界面
            setTimeout(() => {
                showScreen('complete');
            }, 2000);
        }

        // 像素风格结算动画
        function playCompletionAnimation() {
            const animationContainer = document.getElementById('completionAnimation');
            animationContainer.innerHTML = '';
            
            // 创建像素风格的庆祝动画
            const pixelSize = 10;
            const gridSize = 20;
            
            for (let y = 0; y < gridSize; y++) {
                for (let x = 0; x < gridSize; x++) {
                    const pixel = document.createElement('div');
                    pixel.style.position = 'absolute';
                    pixel.style.width = `${pixelSize}px`;
                    pixel.style.height = `${pixelSize}px`;
                    pixel.style.left = `${x * pixelSize}px`;
                    pixel.style.top = `${y * pixelSize}px`;
                    pixel.style.backgroundColor = '#9d4edd';
                    pixel.style.opacity = '0';
                    pixel.style.transition = 'all 0.3s ease';
                    animationContainer.appendChild(pixel);
                    
                    // 延迟显示像素
                    setTimeout(() => {
                        pixel.style.opacity = '1';
                        pixel.style.transform = 'scale(1.2)';
                    }, (x + y) * 50);
                }
            }
            
            // 显示完成文字
            setTimeout(() => {
                const text = document.createElement('div');
                text.style.position = 'absolute';
                text.style.top = '50%';
                text.style.left = '50%';
                text.style.transform = 'translate(-50%, -50%)';
                text.style.fontFamily = 'Courier New, monospace';
                text.style.fontSize = '24px';
                text.style.fontWeight = 'bold';
                text.style.color = '#fff';
                text.style.textShadow = '2px 2px 0 #7b2cbf';
                text.textContent = '关卡完成!';
                animationContainer.appendChild(text);
            }, 1000);
        }

        function updateCamera() {
            const targetX = player.x - 200;
            game.camera.x += (targetX - game.camera.x) * 0.1;
            if (game.camera.x < 0) game.camera.x = 0;
            if (game.camera.x > 1200) game.camera.x = 1200;
        }

        function updateCoins() {
            coins.forEach(coin => {
                if (coin.collected) return;
                coin.animFrame++;
                
                const px = player.x + player.width * PIXEL_SIZE / 2;
                const py = player.y + player.height / 2;
                const cx = coin.x + coin.width / 2;
                const cy = coin.y + coin.height / 2;
                
                const dist = Math.sqrt((px - cx) ** 2 + (py - cy) ** 2);
                if (dist < 20) {
                    coin.collected = true;
                    game.score += 10;
                    document.getElementById('score').textContent = game.score;
                    spawnParticles(coin.x, coin.y, '#ffd700', 8);
                }
            });
        }

        function updateMonsters() {
            monsters.forEach(monster => {
                monster.x += monster.vx;
                monster.animFrame++;
                
                if (monster.x <= monster.minX || monster.x >= monster.maxX) {
                    monster.vx *= -1;
                }
                
                const px = player.x + player.width * PIXEL_SIZE / 2;
                const py = player.y + player.height / 2;
                const mx = monster.x + monster.width / 2;
                const my = monster.y + monster.height / 2;
                
                const dist = Math.sqrt((px - mx) ** 2 + (py - my) ** 2);
                if (dist < 20) {
                    game.lives--;
                    document.getElementById('lives').textContent = game.lives;
                    spawnParticles(player.x, player.y, '#ff0000', 10);
                    
                    if (game.lives <= 0) {
                        game.gameOver = true;
                    } else {
                        player.x = 100;
                        player.y = 200;
                        player.vx = 0;
                        player.vy = 0;
                        game.camera.x = 0;
                    }
                }
            });
        }

        const keys = { left: false, right: false, jump: false };

        document.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
            if (e.code === 'Space') {
                keys.jump = true;
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
            if (e.code === 'Space') keys.jump = false;
        });

        function drawBackground() {
            // 绘制深紫色天空背景
            ctx.fillStyle = '#1a0a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制像素风格的紫色墙壁
            const wallHeight = 250;
            const brickWidth = 40;
            const brickHeight = 20;
            const parallaxX = game.camera.x * 0.2;
            
            // 绘制墙壁背景层
            for (let y = canvas.height - wallHeight; y < canvas.height; y += brickHeight) {
                for (let x = -brickWidth; x < canvas.width + brickWidth; x += brickWidth) {
                    const offsetX = (y / brickHeight) % 2 === 0 ? 0 : brickWidth / 2;
                    const drawX = x - (parallaxX % brickWidth) + offsetX;
                    
                    // 砖块颜色变化，营造像素感
                    const colorVariation = Math.sin((x + y) * 0.1) * 20;
                    const r = 60 + colorVariation;
                    const g = 30 + colorVariation * 0.5;
                    const b = 90 + colorVariation;
                    ctx.fillStyle = `rgb(${Math.floor(r)}, ${Math.floor(g)}, ${Math.floor(b)})`;
                    ctx.fillRect(drawX, y, brickWidth - 2, brickHeight - 2);
                }
            }
            
            // 绘制像素风格的窗户
            const windows = [
                { x: 150, y: 180, width: 60, height: 80 },
                { x: 400, y: 160, width: 50, height: 70 },
                { x: 650, y: 190, width: 55, height: 75 },
                { x: 900, y: 170, width: 60, height: 80 },
                { x: 1150, y: 185, width: 50, height: 70 },
                { x: 1400, y: 165, width: 55, height: 75 },
                { x: 1650, y: 195, width: 60, height: 80 }
            ];
            
            windows.forEach(win => {
                const drawX = win.x - parallaxX;
                if (drawX + win.width < 0 || drawX > canvas.width) return;
                
                // 窗框
                ctx.fillStyle = '#4a2c6a';
                ctx.fillRect(drawX, win.y, win.width, win.height);
                
                // 窗户玻璃（发光效果）
                const glowIntensity = 0.6 + Math.sin(Date.now() * 0.002 + win.x) * 0.2;
                ctx.fillStyle = `rgba(255, 220, 150, ${glowIntensity})`;
                ctx.fillRect(drawX + 4, win.y + 4, win.width - 8, win.height - 8);
                
                // 窗格（像素风格）
                ctx.fillStyle = '#4a2c6a';
                ctx.fillRect(drawX + win.width / 2 - 2, win.y + 4, 4, win.height - 8);
                ctx.fillRect(drawX + 4, win.y + win.height / 2 - 2, win.width - 8, 4);
                
                // 窗户高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fillRect(drawX + 6, win.y + 6, win.width / 2 - 8, 4);
            });
            
            // 绘制远处的像素星星
            for (let i = 0; i < 30; i++) {
                const starX = (i * 73 - game.camera.x * 0.1) % canvas.width;
                const starY = 30 + (i * 17) % 120;
                const twinkle = Math.sin(Date.now() * 0.003 + i) * 0.5 + 0.5;
                ctx.fillStyle = `rgba(255, 255, 255, ${twinkle * 0.8})`;
                ctx.fillRect(starX, starY, 2, 2);
            }
            
            // 绘制像素云朵
            const clouds = [
                { x: 100, y: 60, size: 1 },
                { x: 500, y: 40, size: 1.2 },
                { x: 900, y: 70, size: 0.8 },
                { x: 1300, y: 50, size: 1.1 }
            ];
            
            clouds.forEach((cloud, index) => {
                const cloudX = (cloud.x - game.camera.x * 0.15 + index * 200) % (canvas.width + 200) - 100;
                const cloudY = cloud.y;
                
                ctx.fillStyle = 'rgba(100, 70, 130, 0.4)';
                // 像素云朵形状
                ctx.fillRect(cloudX, cloudY, 30 * cloud.size, 15 * cloud.size);
                ctx.fillRect(cloudX + 10 * cloud.size, cloudY - 10 * cloud.size, 25 * cloud.size, 15 * cloud.size);
                ctx.fillRect(cloudX + 25 * cloud.size, cloudY, 20 * cloud.size, 12 * cloud.size);
            });
        }

        function drawUI() {
            if (game.gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = '32px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('游戏结束!', canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = '20px Courier New';
                ctx.fillText('金币: ' + game.score, canvas.width / 2, canvas.height / 2 + 20);
                ctx.fillText('按 R 重新开始', canvas.width / 2, canvas.height / 2 + 60);
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyR' && game.gameOver) {
                game.score = 0;
                game.lives = 3;
                game.gameOver = false;
                game.camera.x = 0;
                player.x = 100;
                player.y = 200;
                player.vx = 0;
                player.vy = 0;
                document.getElementById('score').textContent = '0';
                document.getElementById('lives').textContent = '3';
                coins.forEach(c => c.collected = false);
            }
        });

        function gameLoop() {
            drawBackground();
            
            platforms.forEach(p => drawPlatform(p));
            coins.forEach(c => drawCoin(c));
            monsters.forEach(m => drawMonster(m));
            drawPlayer();
            drawParticles();
            
            if (!game.gameOver && !game.levelCompleted) {
                updatePlayer();
                updateCamera();
                updateCoins();
                updateMonsters();
            }
            
            drawUI();
            
            requestAnimationFrame(gameLoop);
        }

        initScreens();
        gameLoop();
    </script>
</body>
</html>
